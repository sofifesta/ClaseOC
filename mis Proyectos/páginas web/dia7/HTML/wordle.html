<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Espacial - "SOL"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0d17; 
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(11, 13, 23, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e2e8f0;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        header img {
            max-height: 50px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .game-title {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e2e8f0;
            text-align: center;
        }

        .game-subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .row {
            display: flex;
            gap: 6px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .tile.active {
            border-color: #38bdf8;
            transform: scale(1.05);
        }

        .tile.correct {
            background-color: #10b981;
            border-color: #10b981;
        }

        .tile.present {
            background-color: #eab308;
            border-color: #eab308;
        }

        .tile.absent {
            background-color: #334155;
            border-color: #334155;
            color: #94a3b8;
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 500px;
            margin-top: 1rem;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .key {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 0;
            flex: 1;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            user-select: none;
            transition: all 0.2s ease;
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .key.wide {
            flex: 1.5;
            font-size: 0.85rem;
        }

        .key.correct { background-color: #10b981; border-color: #10b981; }
        .key.present { background-color: #eab308; border-color: #eab308; }
        .key.absent { background-color: #334155; border-color: #334155; color: #64748b; }

        #message {
            min-height: 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
        }

        .message-success { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .message-error { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        footer {
            padding: 2.5rem;
            text-align: center;
            background: rgba(7, 9, 15, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            margin-top: auto;
        }

        footer p {
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .btn-back {
            background: transparent;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            padding: 0.75rem 2.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .btn-back:hover {
            background: #38bdf8;
            color: #0b0d17;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .tile {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            .key {
                padding: 10px 0;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Cosmos Games</h1>
        <img src="https://ipm.edu.ar/assets/img/logo.png" alt="Logo">
    </header>

    <main>
        <h2 class="game-title">Wordle Espacial</h2>
        <p class="game-subtitle">Adivina la palabra oculta de 3 letras</p>

        <div id="board">
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
        </div>

        <div id="message"></div>

        <div id="keyboard">
            <div class="keyboard-row">
                <button class="key" data-key="Q">Q</button>
                <button class="key" data-key="W">W</button>
                <button class="key" data-key="E">E</button>
                <button class="key" data-key="R">R</button>
                <button class="key" data-key="T">T</button>
                <button class="key" data-key="Y">Y</button>
                <button class="key" data-key="U">U</button>
                <button class="key" data-key="I">I</button>
                <button class="key" data-key="O">O</button>
                <button class="key" data-key="P">P</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-key="A">A</button>
                <button class="key" data-key="S">S</button>
                <button class="key" data-key="D">D</button>
                <button class="key" data-key="F">F</button>
                <button class="key" data-key="G">G</button>
                <button class="key" data-key="H">H</button>
                <button class="key" data-key="J">J</button>
                <button class="key" data-key="K">K</button>
                <button class="key" data-key="L">L</button>
                <button class="key" data-key="Ñ">Ñ</button>
            </div>
            <div class="keyboard-row">
                <button class="key wide" data-key="ENTER">Enviar</button>
                <button class="key" data-key="Z">Z</button>
                <button class="key" data-key="X">X</button>
                <button class="key" data-key="C">C</button>
                <button class="key" data-key="V">V</button>
                <button class="key" data-key="B">B</button>
                <button class="key" data-key="N">N</button>
                <button class="key" data-key="M">M</button>
                <button class="key wide" data-key="BACKSPACE">Borrar</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mi Proyecto de HTML - Clase OC</p>
        <a href="index.html">
            <button type="button" class="btn-back">Volver al Index</button>
        </a>
    </footer>

    <script>
        const targetWord = "SOL";
        const maxAttempts = 6;
        const wordLength = 3;
        
        let currentRow = 0;
        let currentTile = 0;
        let gameOver = false;

        const rows = document.querySelectorAll('.row');
        const messageDisplay = document.getElementById('message');

        function handleKeyPress(key) {
            if (gameOver) return;

            if (key === 'BACKSPACE' || key === 'BACK') {
                deleteLetter();
            } else if (key === 'ENTER') {
                submitGuess();
            } else if (/^[A-ZÑ]$/.test(key)) {
                addLetter(key);
            }
        }

        function addLetter(letter) {
            if (currentTile < wordLength) {
                const tiles = rows[currentRow].children;
                tiles[currentTile].textContent = letter;
                tiles[currentTile].classList.add('active');
                currentTile++;
            }
        }

        function deleteLetter() {
            if (currentTile > 0) {
                currentTile--;
                const tiles = rows[currentRow].children;
                tiles[currentTile].textContent = '';
                tiles[currentTile].classList.remove('active');
            }
        }

        function submitGuess() {
            if (currentTile < wordLength) {
                showMessage("Faltan letras", "error");
                return;
            }

            const tiles = rows[currentRow].children;
            let guess = "";
            for (let i = 0; i < wordLength; i++) {
                guess += tiles[i].textContent;
            }

            for (let i = 0; i < wordLength; i++) {
                const letter = guess[i];
                const tile = tiles[i];
                
                if (letter === targetWord[i]) {
                    tile.classList.add('correct');
                    colorKeyboard(letter, 'correct');
                } else if (targetWord.includes(letter)) {
                    tile.classList.add('present');
                    colorKeyboard(letter, 'present');
                } else {
                    tile.classList.add('absent');
                    colorKeyboard(letter, 'absent');
                }
            }

            if (guess === targetWord) {
                showMessage("¡Excelente! Has ganado 🎉", "success");
                gameOver = true;
                return;
            }

            if (currentRow >= maxAttempts - 1) {
                showMessage(`Game Over. La palabra era: ${targetWord}`, "error");
                gameOver = true;
                return;
            }

            currentRow++;
            currentTile = 0;
        }

        function colorKeyboard(letter, status) {
            const keyButton = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyButton) return;

            if (keyButton.classList.contains('correct')) return;
            if (keyButton.classList.contains('present') && status === 'absent') return;

            keyButton.classList.remove('present', 'absent');
            keyButton.classList.add(status);
        }

        function showMessage(msg, type) {
            messageDisplay.textContent = msg;
            messageDisplay.className = type === 'success' ? 'message-success' : 'message-error';
        }

        window.addEventListener('keydown', (e) => {
            handleKeyPress(e.key.toUpperCase());
        });

        document.querySelectorAll('.key').forEach(button => {
            button.addEventListener('click', () => {
                const key = button.getAttribute('data-key');
                handleKeyPress(key);
            });
        });
    </script>
</body>
</html>
